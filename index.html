<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sethmcbee.com</title>
    <style>
        /* Minimalist reset */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff; /* Clean white background */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* The text styling */
        .landing-text {
            font-size: 1.5rem;
            font-weight: 300;
            color: #333333;
            letter-spacing: 0.1rem;
            opacity: 0;
            animation: fadeIn 2s ease-in forwards;
        }

        /* Smooth fade-in animation */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="landing-text">sethmcbee.com</div>

</body>
