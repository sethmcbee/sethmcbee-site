<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MV6WKLV9NX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-MV6WKLV9NX');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seth McBee</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>☕</text></svg>">

    <style>
        :root {
            --bg-start: #fdfcfb;
            --bg-end: #e2d1c3;
            --text-main: #2f3640; 
            --accent: #0077b5;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            transition: background 7s ease-in-out;
            cursor: pointer;
            overflow: hidden;
            user-select: none;
        }

        #content-container {
            text-align: center;
            max-width: 650px;
            padding: 40px;
        }

        .text-fade {
            font-size: 1.5rem;
            font-weight: 300;
            color: var(--text-main);
            line-height: 1.6;
            letter-spacing: 0.03em;
            opacity: 0;
            transition: opacity 2.5s ease-in-out;
        }

        .text-fade.visible {
            opacity: 1;
        }

        .name-link {
            cursor: pointer;
            transition: color 0.3s ease;
            font-weight: 400;
        }

        .name-link:hover {
            color: var(--accent);
        }

        .icon-container {
            margin-top: 30px;
            display: flex;
            justify-content: center;
        }

        .social-icon {
            width: 32px;
            height: 32px;
            fill: #8a8a8a;
            transition: fill 0.4s ease, transform 0.3s ease;
        }

        .social-icon:hover {
            fill: var(--accent);
            transform: translateY(-2px);
        }

        .hint {
            position: absolute;
            bottom: 40px;
            font-size: 0.7rem;
            color: rgba(47, 54, 64, 0.4); 
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            pointer-events: none;
        }
    </style>
</head>
<body onclick="nextStep()">

    <div id="content-container">
        <div id="text-display" class="text-fade">sethmcbee.com</div>
    </div>

    <div class="hint">CLICK ANYWHERE</div>

    <script>
        const display = document.getElementById('text-display');
        const hint = document.querySelector('.hint');

        function startIntro() {
            display.classList.remove('visible');
            display.innerHTML = "sethmcbee.com";
            setTimeout(() => { display.classList.add('visible'); }, 500);
            setTimeout(() => { if(currentStep === -1) hint.style.opacity = '1'; }, 1000);
        }

        window.onload = startIntro;

        const steps = [
            { text: "The universe is vast.", colors: ["#f5f7fa", "#c3cfe2"] },
            { text: "The more we move through it, the smaller it gets.", colors: ["#faf9f6", "#e2d1c3"] },
            { text: "Cultures are built on the stories we share.", colors: ["#fff1eb", "#edd1d1"] },
            { text: "Travel is how we learn to understand them.", colors: ["#f3e7e9", "#e3eeff"] },
            { text: "Be kind to those who cross your path.", colors: ["#fdfcfb", "#e2d1c3"] },
            { text: "Every friend was once a stranger.", colors: ["#fef9e7", "#f2e6d9"] },
            { text: "Listen deeply, be present, and live in the moment.", colors: ["#e6e9f0", "#eef1f5"] },
            { text: "Time is the most precious gift you can give, even to yourself.", colors: ["#ffecd2", "#fcb69f"] },
            { text: "Products and processes should free our time, not fill it.", colors: ["#faf9f6", "#f2f2f2"] },
            { text: "Thanks for visiting.", colors: ["#fdfcfb", "#e2d1c3"] },
            { text: "...", colors: ["#faf9f6", "#f2f2f2"] },
            { 
                text: `<span class='name-link' onclick='resetSite(event)'>Seth McBee</span>
                       <div class='icon-container'>
                           <a href='https://linkedin.com/in/sethmcbee' target='_blank' rel='noopener noreferrer' onclick='event.stopPropagation()'>
                               <svg class='social-icon' viewBox='0 0 24 24'><path d='M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z'/></svg>
                           </a>
                       </div>`, 
                colors: ["#faf9f6", "#f2f2f2"] 
            }
        ];

        let currentStep = -1;

        function nextStep() {
            if (currentStep >= steps.length - 1) return;

            currentStep++;
            display.classList.remove('visible');
            hint.style.opacity = '0';

            setTimeout(() => {
                display.innerHTML = steps[currentStep].text;
                document.body.style.setProperty('--bg-start', steps[currentStep].colors[0]);
                document.body.style.setProperty('--bg-end', steps[currentStep].colors[1]);
                display.classList.add('visible');
                
                if (currentStep === steps.length - 1) {
                    document.body.style.cursor = 'default';
                }
            }, 1200);
        }

        function resetSite(e) {
            e.stopPropagation();
            currentStep = -1;
            document.body.style.cursor = 'pointer';
            document.body.style.setProperty('--bg-start', '#fdfcfb');
            document.body.style.setProperty('--bg-end', '#e2d1c3');
            startIntro();
        }
    </script>
</body>
</html>
