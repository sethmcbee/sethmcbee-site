<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seth McBee</title>
    <style>
        :root {
            --bg-start: #fff1eb;
            --bg-end: #ace0f9;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            transition: background 3s ease;
            cursor: pointer;
            overflow: hidden;
            user-select: none;
        }

        #content-container {
            text-align: center;
            max-width: 600px;
            padding: 40px;
        }

        .text-fade {
            font-size: 1.6rem;
            font-weight: 300;
            color: #444;
            line-height: 1.5;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .text-fade.visible {
            opacity: 1;
        }

        .linkedin-link {
            display: block;
            margin-top: 20px;
            color: #0077b5;
            text-decoration: none;
            font-size: 1.2rem;
            opacity: 0.8;
        }

        .linkedin-link:hover {
            opacity: 1;
        }

        /* Subtle hint at the bottom */
        .hint {
            position: absolute;
            bottom: 30px;
            font-size: 0.8rem;
            color: rgba(0,0,0,0.2);
            letter-spacing: 1px;
        }
    </style>
</head>
<body onclick="nextStep()">

    <div id="content-container">
        <div id="text-display" class="text-fade">Click to begin</div>
    </div>

    <div class="hint">CLICK ANYWHERE</div>

    <script>
        const steps = [
            { text: "The world is vast, but it grows smaller the more we move through it.", colors: ["#fff1eb", "#ace0f9"] },
            { text: "Cultures are the stories we tell together; travel is how we learn to read them.", colors: ["#fdfcfb", "#e2d1c3"] },
            { text: "When we understand people, we realize we are rarely as different as we seem.", colors: ["#e6e9f0", "#eef1f5"] },
            { text: "I believe the best products are silent partners in a life well-lived.", colors: ["#ffecd2", "#fcb69f"] },
            { text: "Processes should exist to free our time, not to fill it.", colors: ["#d4fc79", "#b7f8db"] },
            { text: "Let strangers in; every friend was a stranger once.", colors: ["#f6d365", "#fda085"] },
            { text: "Listen deeply. Be kind to every soul that crosses your path.", colors: ["#cfd9df", "#e2ebf0"] },
            { 
                text: "Thanks for visiting.<br><br><strong>Seth McBee</strong><br><a href='https://linkedin.com/in/sethmcbee' class='linkedin-link' onclick='event.stopPropagation()'>LinkedIn</a>", 
                colors: ["#fff1eb", "#ace0f9"] 
            }
        ];

        let currentStep = -1;

        function nextStep() {
            currentStep++;
            if (currentStep >= steps.length) return;

            const display = document.getElementById('text-display');
            
            // Fade out current text
            display.classList.remove('visible');

            setTimeout(() => {
                // Update text and colors
                display.innerHTML = steps[currentStep].text;
                document.body.style.setProperty('--bg-start', steps[currentStep].colors[0]);
                document.body.style.setProperty('--bg-end', steps[currentStep].colors[1]);
                
                // Fade in new text
                display.classList.add('visible');
            }, 800);

            // Hide hint after first click
            if (currentStep === 0) {
                document.querySelector('.hint').style.display = 'none';
            }
        }
    </script>
</body>
</html>
